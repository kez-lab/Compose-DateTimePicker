name: CI - Compose Multiplatform TimePicker (Build & Test)

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LIBRARY_MODULE: ":datetimepicker"
  SAMPLE_MODULE: ":sample"
jobs:
  repository-hygiene:
    name: Linux • Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR diff whitespace
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

  abi-check:
    name: macOS • Kotlin ABI Check
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-36" \
                     "build-tools;36.0.0"
          yes | sdkmanager --licenses

      - name: Gradle Check • Kotlin ABI
        run: |
          ./gradlew \
            ${{ env.LIBRARY_MODULE }}:checkLegacyAbi \
            --no-daemon

  linux-builds:
    name: Linux • ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target: [ android, wasm, desktop ]
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      # Android Set Up
      - name: Set up Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        if: matrix.target == 'android'
        run: |
          sdkmanager "platform-tools" \
                     "emulator" \
                     "platforms;android-35" \
                     "platforms;android-36" \
                     "build-tools;36.0.0" \
                     "system-images;android-35;aosp_atd;x86_64"
          yes | sdkmanager --licenses

      - name: Enable KVM permissions
        if: matrix.target == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Android Build/Unit Test
      - name: Gradle Build • Android
        if: matrix.target == 'android'
        run: |
          ./gradlew \
            ${{ env.LIBRARY_MODULE }}:clean \
            ${{ env.LIBRARY_MODULE }}:assembleRelease \
            ${{ env.LIBRARY_MODULE }}:testReleaseUnitTest \
            ${{ env.SAMPLE_MODULE }}:assembleDebug \
            --no-daemon

      # Android Managed Device Instrumented Test
      - name: Gradle Instrumented Test • Android managed device
        if: matrix.target == 'android'
        run: |
          ./gradlew \
            ${{ env.LIBRARY_MODULE }}:pixel2Api35DebugAndroidTest \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --stacktrace \
            --no-daemon

      - name: Upload Android instrumented test reports
        if: matrix.target == 'android' && always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-test-reports
          path: |
            datetimepicker/build/reports/androidTests/**
            datetimepicker/build/outputs/androidTest-results/**
            datetimepicker/build/outputs/managed_device_android_test_additional_output/**
          if-no-files-found: ignore

      # Web(WASM) Build/Test
      - name: Gradle Build • Web (WASM)
        if: matrix.target == 'wasm'
        run: |
          ./gradlew \
            ${{ env.LIBRARY_MODULE }}:clean \
            ${{ env.LIBRARY_MODULE }}:wasmJsBrowserDistribution \
            ${{ env.LIBRARY_MODULE }}:wasmJsTest \
            ${{ env.SAMPLE_MODULE }}:wasmJsBrowserDistribution \
            --no-daemon

      # Desktop(JVM) Build/Test
      - name: Gradle Build • Desktop (JVM)
        if: matrix.target == 'desktop'
        run: |
          ./gradlew \
            ${{ env.LIBRARY_MODULE }}:clean \
            ${{ env.LIBRARY_MODULE }}:desktopJar \
            ${{ env.LIBRARY_MODULE }}:desktopTest \
            ${{ env.SAMPLE_MODULE }}:compileKotlinDesktop \
            --no-daemon

  ios-build-and-test:
    name: macOS • iOS Simulator Test
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Boot iOS Simulator (iPhone 15)
        run: |
          LATEST_IOS=$(xcrun simctl list runtimes | grep "iOS" | tail -n 1 | sed -E 's/.*iOS ([0-9]+\.[0-9]+).*/iOS \1/')
          echo "Using iOS runtime: $LATEST_IOS"
          xcrun simctl create "CI-iPhone15" "iPhone 15" "$LATEST_IOS" || true
          xcrun simctl boot "CI-iPhone15" || true
          xcrun simctl list | head -n 50

      # iOS Simulator Unit Test
      - name: Gradle Build & Test • iOS
        run: |
          ./gradlew \
            ${{ env.LIBRARY_MODULE }}:clean \
            ${{ env.LIBRARY_MODULE }}:iosSimulatorArm64Test \
            ${{ env.SAMPLE_MODULE }}:compileKotlinIosSimulatorArm64 \
            --no-daemon
